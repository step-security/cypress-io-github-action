name: example-webpack
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  wait:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cypress tests
        uses: ./ # if copying, replace with step-security/cypress-io-github-action@v7
        with:
          working-directory: examples/webpack
          start: npm start
          wait-on: 'http://localhost:8080'
