name: example-component-test
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cypress run
        uses: ./ # if copying, replace with step-security/cypress-io-github-action@v7
        with:
          working-directory: examples/component-tests
          component: true
