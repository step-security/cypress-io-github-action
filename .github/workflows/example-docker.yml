name: example-docker
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  docker-browsers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge, electron, firefox]
    # Cypress Docker image documentation on https://github.com/cypress-io/cypress-docker-images
    # Available cypress/browsers tags listed on https://hub.docker.com/r/cypress/browsers/tags
    container:
      image: cypress/browsers:24.14.0
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cypress tests
        uses: ./ # if copying, replace with step-security/cypress-io-github-action@v7
        with:
          working-directory: examples/basic
          browser: ${{ matrix.browser }}
