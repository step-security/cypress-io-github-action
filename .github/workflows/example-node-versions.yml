name: example-node-versions
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    # let's make sure Cypress works on several versions of Node
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
          - 24
          - 25
    name: Cypress E2E on Node v${{ matrix.node }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
      - run: node -v
      - run: npm -v

      - name: Cypress tests
        uses: ./ # if copying, replace with step-security/cypress-io-github-action@v7
        with:
          working-directory: examples/node-versions
